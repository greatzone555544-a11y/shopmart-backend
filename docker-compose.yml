services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: shopmart
      POSTGRES_USER: shopmart
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/shopmart
      DB_USERNAME: shopmart
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-please-256bit}
      JPA_DDL_AUTO: update
      # Optional: PAYMENT_PROVIDER, MAIL_ENABLED, etc.
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pgdata:
