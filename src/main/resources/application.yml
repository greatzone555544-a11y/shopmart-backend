spring:
  application:
    name: shopmart-backend

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Was `update` (Hibernate auto-DDL). Flyway now owns the schema; Hibernate only
      # validates that entity mappings match what Flyway created — it will refuse to start
      # if they've drifted, which is the point (catches mapping/migration mismatches at
      # boot instead of silently auto-altering production tables).
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        generate_statistics: true
    open-in-view: false
    show-sql: ${JPA_SHOW_SQL:false}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    # This codebase has been running on ddl-auto=update, so the live Railway DB already has
    # a schema Flyway didn't create. baseline-on-migrate lets Flyway adopt an existing
    # database: on first run it stamps the DB as already being at baseline-version (1)
    # without trying to re-run schema creation, then applies V2+ normally from there.
    # IMPORTANT: this means V1 is intentionally absent from db/migration (see the migration
    # folder's README) — do not add a V1 migration, or Flyway will try to run it against a
    # database that already has that schema and fail.
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: 1
    validate-on-migrate: true
    out-of-order: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 25MB

  cache:
    type: ${CACHE_TYPE:simple}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: ${JWT_ACCESS_EXP:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXP:604800000}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

  otp:
    expiration-minutes: 10
    length: 6

  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:no-reply@shopmart.local}

  sms:
    enabled: ${SMS_ENABLED:false}
    api-url: ${SMS_API_URL:https://www.fast2sms.com/dev/bulkV2}
    api-key: ${SMS_API_KEY:}
    sender-id: ${SMS_SENDER_ID:SHPMRT}

  payments:
    provider: ${PAYMENT_PROVIDER:stub}

    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
      webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}

    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    phonepe:
      merchant-id: ${PHONEPE_MERCHANT_ID:}
      salt-key: ${PHONEPE_SALT_KEY:}
      salt-index: ${PHONEPE_SALT_INDEX:1}

  loyalty:
    amount-per-point: ${LOYALTY_AMOUNT_PER_POINT:100}
    point-value: ${LOYALTY_POINT_VALUE:1.0}

  search:
    provider: ${SEARCH_PROVIDER:lexical}
    elasticsearch:
      url: ${ELASTICSEARCH_URL:http://localhost:9200}

  currency:
    base: ${CURRENCY_BASE:INR}
    rates: ${CURRENCY_RATES:INR:1,USD:0.012,EUR:0.011,GBP:0.0095,AED:0.044}

  i18n:
    default-locale: ${DEFAULT_LOCALE:en}
    supported: ${SUPPORTED_LOCALES:en,hi,gu,fr,es}

  seo:
    base-url: ${SEO_BASE_URL:https://shopmart.local}

  security:
    rate-limit:
      login:
        max-attempts: ${LOGIN_RATE_LIMIT_MAX:5}
        window-seconds: ${LOGIN_RATE_LIMIT_WINDOW:900}
      otp:
        max-attempts: ${OTP_RATE_LIMIT_MAX:5}
        window-seconds: ${OTP_RATE_LIMIT_WINDOW:900}

  reports:
    scheduled:
      enabled: ${SCHEDULED_REPORTS_ENABLED:true}

  notifications:
    campaigns:
      poll-interval-ms: ${CAMPAIGN_POLL_INTERVAL_MS:60000}

  customer:
    segments:
      vip-min-spend: ${SEGMENT_VIP_MIN_SPEND:50000}
      high-value-min-spend: ${SEGMENT_HIGH_VALUE_MIN_SPEND:20000}
      new-customer-days: ${SEGMENT_NEW_CUSTOMER_DAYS:30}
      inactive-days: ${SEGMENT_INACTIVE_DAYS:90}

  push:
    # false = LoggingPushSender (default, no external credentials needed).
    # true  = FcmPushSender — requires FIREBASE_SERVICE_ACCOUNT_JSON or
    #         FIREBASE_SERVICE_ACCOUNT_BASE64 to be set, or the app fails to start
    #         (see FirebaseConfig).
    enabled: ${PUSH_ENABLED:false}
    fcm:
      service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
      service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}

  storage:
    # local (default, dev-only, ephemeral on Railway) | s3 | cloudinary
    provider: ${STORAGE_PROVIDER:local}
    local:
      base-path: ${STORAGE_LOCAL_PATH:./uploads}
      public-base-url: ${STORAGE_LOCAL_PUBLIC_URL:http://localhost:8080/uploads}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_S3_REGION:ap-south-1}
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      public-base-url: ${AWS_S3_PUBLIC_URL:}
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}

  alerts:
    # log (default, zero-config) | slack
    channel: ${ALERT_CHANNEL:log}
    slack:
      webhook-url: ${SLACK_ALERT_WEBHOOK_URL:}
    poll-interval-ms: ${ALERT_POLL_INTERVAL_MS:300000}
    health-poll-interval-ms: ${ALERT_HEALTH_POLL_INTERVAL_MS:120000}
    thresholds:
      errors-per-window: ${ALERT_THRESHOLD_ERRORS:10}
      payment-failures-per-window: ${ALERT_THRESHOLD_PAYMENT_FAILURES:5}
      webhook-rejections-per-window: ${ALERT_THRESHOLD_WEBHOOK_REJECTIONS:5}
      notification-failures-per-window: ${ALERT_THRESHOLD_NOTIFICATION_FAILURES:10}
      rate-limit-blocks-per-window: ${ALERT_THRESHOLD_RATE_LIMIT_BLOCKS:20}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: ${ACTUATOR_HEALTH_DETAILS:when-authorized}
      probes:
        enabled: true
  metrics:
    tags:
      application: shopmart-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true

logging:
  level:
    com.shopmart: ${LOG_LEVEL:INFO}
  threshold:
    console: INFO

app-slow-query-threshold-ms: ${SLOW_QUERY_THRESHOLD_MS:1000}
